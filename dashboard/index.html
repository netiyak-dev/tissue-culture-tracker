<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1" />
<meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate" />
<meta http-equiv="Pragma" content="no-cache" />
<meta http-equiv="Expires" content="0" />
<title>สรุปข้อมูล — เพาะเลี้ยงเนื้อเยื่อ</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Sarabun:wght@400;600;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="../shared/style.css" />
<script src="https://static.line-scdn.net/liff/edge/2/sdk.js"></script>
</head>
<body>
<div class="screen" style="max-width:720px;">

  <div class="topbar">
    <a href="../liff-app/index.html" class="back-btn">‹</a>
    <h1>สรุปข้อมูล</h1>
    <span class="lab-badge hidden" id="lab-badge"></span>
  </div>

  <div class="chip-grid hidden" id="lab-filter" style="grid-template-columns:repeat(4,1fr);margin-bottom:16px;"></div>

  <div class="stat-row" id="stat-row">
    <div class="stat-box"><div class="num">–</div><div class="label">ล็อตทั้งหมด</div></div>
    <div class="stat-box"><div class="num">–</div><div class="label">ต้นรวม</div></div>
    <div class="stat-box"><div class="num">–</div><div class="label">ใกล้ถึงกำหนด</div></div>
  </div>

  <a href="simulate.html" class="btn btn-outline btn-block">📈 จำลองรอบการผลิต</a>

  <div class="dashboard-grid">
    <div>
      <h2>ใกล้ถึงกำหนดถ่ายโอน</h2>
      <div class="card" id="due-card">
        <div id="due-list"><p class="muted">กำลังโหลด...</p></div>
      </div>

      <h2>ภาพรวมที่เก็บ</h2>
      <div class="card">
        <div id="storage-overview" class="storage-grid"></div>
      </div>
    </div>

    <div>
      <h2>สมาชิกแลป</h2>
      <div class="card" id="members-card">
        <div id="members-list"></div>
      </div>

      <h2>ภาพรวมตามชนิดพืช</h2>
      <div class="field" style="margin-bottom:12px;">
        <label>วันที่อยากได้เนื้อเยื่อ (ไม่บังคับ)</label>
        <input type="date" id="target-date-input" />
      </div>
      <div id="expected-totals" style="margin-bottom:12px;"></div>
      <div id="plant-overview"></div>
    </div>
  </div>

</div>

<script src="../liff-app/js/api.js"></script>
<script>
let lastByPlant = []; // จำผลล่าสุดของ by_plant ไว้ เพื่อคำนวณสถานะ "ทันตามเป้า" ใหม่ได้ทันทีตอนพิมพ์จำนวนที่ต้องการ ไม่ต้องโหลดซ้ำ
const expectedByPlant = {}; // plant_name -> จำนวนที่ต้องการที่ผู้ใช้กรอกสด (เก็บไว้ในหน้านี้เท่านั้น ไม่บันทึกลงระบบ)

function formatThaiDateClient(isoDateStr) {
  const months = ["ม.ค.", "ก.พ.", "มี.ค.", "เม.ย.", "พ.ค.", "มิ.ย.", "ก.ค.", "ส.ค.", "ก.ย.", "ต.ค.", "พ.ย.", "ธ.ค."];
  const d = new Date(isoDateStr + "T00:00:00");
  const buddhistYear = d.getFullYear() + 543;
  return `${d.getDate()} ${months[d.getMonth()]} ${String(buddhistYear).slice(-2)}`;
}

function stageStepper(stage) {
  const stages = ["ขยาย", "กระตุ้นราก", "พร้อมออกปลูก"];
  const currentIdx = stages.indexOf(stage);
  return `
    <div class="stage-stepper">
      ${stages.map((s, i) => {
        let cls = "stage-step";
        if (i < currentIdx) cls += " done";
        if (i === currentIdx) cls += " current";
        return `<div class="${cls}"><div class="stage-line"></div><div class="dot"></div>${s}</div>`;
      }).join("")}
    </div>
  `;
}

function renderLabFilter(data) {
  const filter = document.getElementById("lab-filter");
  if (!data.is_admin) {
    filter.classList.add("hidden");
    return;
  }
  filter.classList.remove("hidden");
  filter.innerHTML = "";
  [["", "ทุก Lab"], ...LABS.map(l => [l, l])].forEach(([value, label]) => {
    const chip = document.createElement("div");
    chip.className = "chip" + ((data.lab || "") === value ? " active" : "");
    chip.textContent = label;
    chip.addEventListener("click", () => loadDashboard(value));
    filter.appendChild(chip);
  });
}

function renderMembers(data) {
  const list = document.getElementById("members-list");
  if (!data.members || data.members.length === 0) {
    list.innerHTML = '<p class="muted">ยังไม่มีสมาชิกในแลปนี้</p>';
    return;
  }
  if (data.lab) {
    list.innerHTML = data.members.map(m => `
      <div class="due-item">
        <div class="name">${m.display_name}</div>
        <div class="muted">${m.role === "admin" ? "Admin" : "User"}</div>
      </div>
    `).join("");
    return;
  }
  list.innerHTML = LABS.map(lab => {
    const inLab = data.members.filter(m => m.lab === lab);
    return `
      <h3 style="margin-top:12px;">Lab ${lab}</h3>
      ${inLab.length === 0
        ? '<p class="muted">ยังไม่มีสมาชิก</p>'
        : inLab.map(m => `
          <div class="due-item">
            <div class="name">${m.display_name}</div>
            <div class="muted">${m.role === "admin" ? "Admin" : "User"}</div>
          </div>
        `).join("")}
    `;
  }).join("");
}

function evaluateStatus(predicted, expected) {
  if (expected === undefined || expected === "" || isNaN(Number(expected))) return "";
  if (predicted === undefined) return "";
  const ok = predicted >= Number(expected);
  const color = ok ? "var(--leaf)" : "var(--alert)";
  return `<div class="muted" style="margin-top:4px;font-weight:600;color:${color};">${ok ? "ทันตามเป้า ✓" : "ไม่ทันตามเป้า ✕"}</div>`;
}

function renderTotals() {
  lastByPlant.forEach((p, idx) => {
    const statusEl = document.querySelector(`[data-status="${idx}"]`);
    if (statusEl) statusEl.innerHTML = evaluateStatus(p.predicted_total, expectedByPlant[p.plant_name]);
  });

  let sumExpected = 0, sumPredicted = 0, any = false;
  lastByPlant.forEach(p => {
    const exp = expectedByPlant[p.plant_name];
    if (exp !== undefined && exp !== "" && !isNaN(Number(exp)) && p.predicted_total !== undefined) {
      sumExpected += Number(exp);
      sumPredicted += p.predicted_total;
      any = true;
    }
  });
  const totalsEl = document.getElementById("expected-totals");
  if (!any) { totalsEl.innerHTML = ""; return; }
  const ok = sumPredicted >= sumExpected;
  const color = ok ? "var(--leaf)" : "var(--alert)";
  totalsEl.innerHTML = `<div class="card muted" style="font-weight:600;color:${color};">รวมที่ต้องการ ${sumExpected} ต้น · พยากรณ์ได้รวม ${sumPredicted} ต้น — ${ok ? "ทันตามเป้า ✓" : "ไม่ทันตามเป้า ✕"}</div>`;
}

function renderPlantOverview(targetDateVal) {
  const plantOverview = document.getElementById("plant-overview");
  plantOverview.innerHTML = lastByPlant.map((p, idx) => `
    <div class="card">
      <h3>${p.plant_name} <span class="muted">· ${p.total} ล็อต</span></h3>
      ${stageStepper(p.dominant_stage)}
      <div class="muted">ขยาย ${p.stage_counts.ขยาย} ต้น · กระตุ้นราก ${p.stage_counts.กระตุ้นราก} ต้น · พร้อมออกปลูก ${p.stage_counts.พร้อมออกปลูก} ต้น</div>
      ${p.predicted_total !== undefined ? `<div class="muted" style="margin-top:6px;color:var(--forest);font-weight:600;">พยากรณ์ ณ ${formatThaiDateClient(targetDateVal)}: ${p.predicted_total} ต้น</div>` : ""}
      <div class="field" style="margin-top:8px;margin-bottom:0;">
        <label>จำนวนที่ต้องการ (ไม่บังคับ)</label>
        <input type="number" class="expected-input" data-idx="${idx}" min="0" inputmode="numeric" value="${expectedByPlant[p.plant_name] || ""}" placeholder="เช่น 100" />
      </div>
      <div data-status="${idx}"></div>
    </div>
  `).join("") || '<p class="muted">ยังไม่มีข้อมูล</p>';
  renderTotals();
}

document.getElementById("plant-overview").addEventListener("input", (e) => {
  if (!e.target.classList.contains("expected-input")) return;
  const idx = Number(e.target.dataset.idx);
  const plant = lastByPlant[idx];
  if (!plant) return;
  expectedByPlant[plant.plant_name] = e.target.value;
  renderTotals();
});

async function loadDashboard(viewLab) {
  try {
    const targetDateVal = document.getElementById("target-date-input").value;
    const payload = {};
    if (viewLab) payload.view_lab = viewLab;
    if (targetDateVal) payload.target_date = targetDateVal;
    const data = await TissueApp.call("getDashboard", payload);

    const badge = document.getElementById("lab-badge");
    badge.textContent = data.lab ? "Lab " + data.lab : "ทุก Lab";
    badge.classList.remove("hidden");

    renderLabFilter(data);
    renderMembers(data);

    // แถบสรุป
    const statRow = document.getElementById("stat-row");
    statRow.innerHTML = `
      <div class="stat-box"><div class="num">${data.total_lots}</div><div class="label">ล็อตทั้งหมด</div></div>
      <div class="stat-box"><div class="num">${data.total_plants}</div><div class="label">ต้นรวม</div></div>
      <div class="stat-box"><div class="num">${data.due_soon.length}</div><div class="label">ใกล้ถึงกำหนด</div></div>
    `;

    // ใกล้ถึงกำหนด
    const dueList = document.getElementById("due-list");
    if (data.due_soon.length === 0) {
      dueList.innerHTML = '<p class="muted">ไม่มีล็อตที่ใกล้ถึงกำหนดในช่วงนี้</p>';
    } else {
      dueList.innerHTML = data.due_soon.map(d => `
        <div class="due-item">
          <div>
            <div class="name">${data.lab ? "" : "Lab " + d.lab + " · "}${d.plant_name} <span class="muted">(${d.stage} รอบที่ ${d.round_in_stage})</span></div>
            <div class="loc">ล็อต ${d.lot_no} · ชั้น ${d.shelf}/${d.sub_shelf} · ${d.media_type}${d.bottle_no ? " #" + d.bottle_no : ""} · สูตรรอบหน้า: ${d.next_recipe || "-"}</div>
            <div class="loc">บันทึกโดย: ${d.recorded_by || "-"}</div>
          </div>
          <div class="date">${d.next_transfer_date}</div>
        </div>
      `).join("");
    }

    // ภาพรวมตามชนิดพืช
    lastByPlant = data.by_plant;
    renderPlantOverview(targetDateVal);

    // ภาพรวมที่เก็บ
    const storageEl = document.getElementById("storage-overview");
    storageEl.innerHTML = data.storage_overview.map(s => `
      <div class="storage-cell ${s.count === 0 ? 'empty' : ''}">
        <div class="n">${s.count}</div>
        <div class="loc">${s.shelf}/${s.sub_shelf}</div>
      </div>
    `).join("");

  } catch (err) {
    document.getElementById("due-list").innerHTML = `<p class="muted">โหลดข้อมูลไม่สำเร็จ: ${err.message}</p>`;
  }
}

document.getElementById("target-date-input").addEventListener("change", () => {
  const activeChip = document.querySelector("#lab-filter .chip.active");
  loadDashboard(activeChip ? (activeChip.textContent === "ทุก Lab" ? "" : activeChip.textContent) : undefined);
});

(async () => {
  await TissueApp.init();
  loadDashboard();
})();
</script>
</body>
</html>
