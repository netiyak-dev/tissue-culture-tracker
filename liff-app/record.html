<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1" />
<title>บันทึกการถ่ายโอน</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Sarabun:wght@400;600;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="../shared/style.css" />
<script src="https://static.line-scdn.net/liff/edge/2/sdk.js"></script>
</head>
<body>
<div class="screen">

  <div class="topbar">
    <a href="index.html" class="back-btn">‹</a>
    <h1 id="plant-title">บันทึกการถ่ายโอน</h1>
    <span class="lab-badge hidden" id="lab-badge"></span>
  </div>

  <!-- แสดงผลหลังบันทึกสำเร็จ -->
  <div id="result-banner" class="banner banner-success hidden">
    <div class="big">บันทึกแล้ว ✓</div>
    <div class="detail" id="result-detail"></div>
  </div>

  <div id="form-wrap">
    <div class="field">
      <label>ชนิดพืช</label>
      <select id="plant-select"></select>
    </div>

    <div class="field">
      <label>หมายเลขล็อต</label>
      <div id="lot-mode-grid" class="chip-grid chip-grid-2">
        <div class="chip chip-lg active" data-lot-mode="new">ล็อตใหม่</div>
        <div class="chip chip-lg" data-lot-mode="existing">เลือกล็อตที่มีอยู่</div>
      </div>
    </div>

    <div class="field" id="lot-new-field">
      <input type="text" id="lot-no-input" placeholder="เช่น 7" />
      <p class="muted" id="latest-lot-hint" style="margin-top:6px;"></p>
    </div>

    <div class="field hidden" id="lot-existing-field">
      <div id="lot-list"></div>
    </div>

    <div class="field">
      <label>จำนวนขวดที่ทำได้ (ขวด)</label>
      <input type="number" id="bottle-count" inputmode="numeric" min="1" value="20" placeholder="เช่น 20" />
    </div>

    <div class="field">
      <label>จำนวนต้นต่อขวด</label>
      <input type="number" id="plants-per-bottle" inputmode="numeric" min="1" placeholder="เช่น 1" />
      <p class="muted" id="quantity-preview" style="margin-top:6px;"></p>
    </div>

    <div class="field">
      <label>ประเภทรอบนี้</label>
      <div id="media-type-grid" class="chip-grid chip-grid-2">
        <div class="chip chip-lg" data-media="SS">SS<span class="sub">กึ่งแข็ง</span></div>
        <div class="chip chip-lg" data-media="TIB">TIB<span class="sub">อาหารเหลว</span></div>
      </div>
    </div>

    <div class="field hidden" id="bottle-no-field">
      <label>หมายเลขขวด (สำหรับ TIB)</label>
      <input type="text" id="bottle-no" placeholder="เช่น TIB-014" />
    </div>

    <div class="field">
      <label>ชั้นเก็บ</label>
      <div id="shelf-grid" class="chip-grid"></div>
    </div>

    <div class="field">
      <label>ช่องเก็บ</label>
      <div id="subshelf-grid" class="chip-grid"></div>
    </div>

    <button id="save-btn" class="btn btn-primary btn-block">บันทึก</button>
  </div>

  <div id="after-actions" class="hidden">
    <button id="record-next-btn" class="btn btn-primary btn-block">บันทึกอีกรายการ</button>
    <a href="index.html" class="btn btn-outline btn-block">กลับหน้าหลัก</a>
  </div>

</div>

<script src="js/api.js"></script>
<script>
let selectedShelf = null;
let selectedSub = null;
let selectedMedia = null;
let plantsCache = [];
let storageCache = { shelves: [], subs: [] };
let lotMode = "new";
let selectedLotNo = null;

function renderChips(container, items, onPick, addLabel) {
  container.innerHTML = "";
  items.forEach(val => {
    const chip = document.createElement("div");
    chip.className = "chip";
    chip.textContent = val;
    chip.addEventListener("click", () => onPick(val, chip, container));
    container.appendChild(chip);
  });
  const addChip = document.createElement("div");
  addChip.className = "chip add-new";
  addChip.textContent = "+ เพิ่ม";
  addChip.addEventListener("click", async () => {
    const val = prompt(addLabel);
    if (!val) return;
    await TissueApp.call("addStorageValue", {
      type: container === document.getElementById("shelf-grid") ? "shelf" : "sub_shelf",
      value: val,
    });
    await loadStorage();
  });
  container.appendChild(addChip);
}

function pickShelf(val, chip, container) {
  [...container.children].forEach(c => c.classList.remove("active"));
  chip.classList.add("active");
  selectedShelf = val;
}
function pickSub(val, chip, container) {
  [...container.children].forEach(c => c.classList.remove("active"));
  chip.classList.add("active");
  selectedSub = val;
}

// ---------- เลือกประเภทรอบ TIB / SS ----------
document.querySelectorAll("#media-type-grid .chip").forEach(chip => {
  chip.addEventListener("click", () => {
    document.querySelectorAll("#media-type-grid .chip").forEach(c => c.classList.remove("active"));
    chip.classList.add("active");
    selectedMedia = chip.dataset.media;
    document.getElementById("bottle-no-field").classList.toggle("hidden", selectedMedia !== "TIB");
  });
});

// ---------- preview จำนวนต้นรวม (ขวด x ต้นต่อขวด) — แค่โชว์ ค่าจริงคำนวณที่ backend ----------
function updateQuantityPreview() {
  const bottleCount = Number(document.getElementById("bottle-count").value);
  const perBottle = Number(document.getElementById("plants-per-bottle").value);
  const preview = document.getElementById("quantity-preview");
  preview.textContent = (bottleCount > 0 && perBottle > 0) ? `= ${bottleCount * perBottle} ต้น` : "";
}
document.getElementById("bottle-count").addEventListener("input", updateQuantityPreview);
document.getElementById("plants-per-bottle").addEventListener("input", updateQuantityPreview);

// ---------- เลือกล็อตใหม่ / ล็อตที่มีอยู่ ----------
document.querySelectorAll("#lot-mode-grid .chip").forEach(chip => {
  chip.addEventListener("click", () => {
    document.querySelectorAll("#lot-mode-grid .chip").forEach(c => c.classList.remove("active"));
    chip.classList.add("active");
    lotMode = chip.dataset.lotMode;
    document.getElementById("lot-new-field").classList.toggle("hidden", lotMode !== "new");
    document.getElementById("lot-existing-field").classList.toggle("hidden", lotMode !== "existing");
    if (lotMode === "existing") loadActiveLots();
  });
});

async function loadActiveLots() {
  const plant_id = document.getElementById("plant-select").value;
  const list = document.getElementById("lot-list");
  selectedLotNo = null;
  if (!plant_id) {
    list.innerHTML = '<p class="muted">กรุณาเลือกชนิดพืชก่อน</p>';
    return;
  }
  list.innerHTML = '<p class="muted">กำลังโหลด...</p>';
  const lots = await TissueApp.call("listActiveLots", { plant_id });
  list.innerHTML = "";
  if (lots.length === 0) {
    list.innerHTML = '<p class="muted">ชนิดนี้ยังไม่มีล็อตที่กำลังติดตามอยู่</p>';
    return;
  }
  lots.forEach(l => {
    const card = document.createElement("div");
    card.className = "card card-tap";
    card.innerHTML = `
      <div>
        <div class="plant-name">ล็อต ${l.lot_no}</div>
        <div class="plant-count">${l.stage} · รอบที่ ${l.round_no} · ชั้น ${l.shelf}/${l.sub_shelf} · ครบกำหนด ${l.next_transfer_date}</div>
      </div>
      <div class="chevron">›</div>
    `;
    card.addEventListener("click", () => {
      document.querySelectorAll("#lot-list .card").forEach(c => c.classList.remove("active"));
      card.classList.add("active");
      selectedLotNo = l.lot_no;
    });
    list.appendChild(card);
  });
}

async function loadStorage() {
  storageCache = await TissueApp.call("listStorage");
  renderChips(document.getElementById("shelf-grid"), storageCache.shelves, pickShelf, "ชั้นใหม่ (เช่น 5)");
  renderChips(document.getElementById("subshelf-grid"), storageCache.subs, pickSub, "ช่องใหม่ (เช่น D)");
}

async function loadPlants() {
  plantsCache = await TissueApp.call("listPlantsWithCount");
  const sel = document.getElementById("plant-select");
  sel.innerHTML = "";
  plantsCache.forEach(p => {
    const opt = document.createElement("option");
    opt.value = p.plant_id;
    opt.textContent = p.plant_name;
    sel.appendChild(opt);
  });
  const requestedId = TissueApp.getParam("plant_id");
  if (requestedId) sel.value = requestedId;
  updateTitle();
  updateLatestLotHint();
}

function updateTitle() {
  const sel = document.getElementById("plant-select");
  const plant = plantsCache.find(p => p.plant_id === sel.value);
  document.getElementById("plant-title").textContent = plant ? plant.plant_name : "บันทึกการถ่ายโอน";
}

/** โชว์เลขล็อตล่าสุดที่เคยใช้ของชนิดพืชนี้ใน Lab ตัวเอง ช่วยจำว่าล็อตใหม่ควรเป็นเลขอะไรต่อ */
function updateLatestLotHint() {
  const sel = document.getElementById("plant-select");
  const plant = plantsCache.find(p => p.plant_id === sel.value);
  const hint = document.getElementById("latest-lot-hint");
  hint.textContent = (plant && plant.latest_lot_no !== null && plant.latest_lot_no !== undefined)
    ? `ล็อตล่าสุดของชนิดนี้ใน Lab คุณ: ${plant.latest_lot_no}`
    : "";
}

document.getElementById("plant-select").addEventListener("change", () => {
  updateTitle();
  updateLatestLotHint();
  if (lotMode === "existing") loadActiveLots();
});

document.getElementById("save-btn").addEventListener("click", async () => {
  const plant_id = document.getElementById("plant-select").value;
  const bottleCount = document.getElementById("bottle-count").value;
  const plantsPerBottle = document.getElementById("plants-per-bottle").value;
  const bottle_no = document.getElementById("bottle-no").value.trim();
  const lot_no = lotMode === "new" ? document.getElementById("lot-no-input").value.trim() : selectedLotNo;

  if (!plant_id) return alert("กรุณาเลือกชนิดพืช");
  if (!lot_no) return alert(lotMode === "new" ? "กรุณาพิมพ์หมายเลขล็อต" : "กรุณาเลือกล็อตที่มีอยู่");
  if (!bottleCount || Number(bottleCount) <= 0) return alert("กรุณาใส่จำนวนขวดที่ทำได้");
  if (!plantsPerBottle || Number(plantsPerBottle) <= 0) return alert("กรุณาใส่จำนวนต้นต่อขวด");
  if (!selectedMedia) return alert("กรุณาเลือกประเภทรอบนี้ (TIB หรือ SS)");
  if (selectedMedia === "TIB" && !bottle_no) return alert("กรุณาใส่หมายเลขขวด (จำเป็นสำหรับ TIB)");
  if (!selectedShelf) return alert("กรุณาเลือกชั้นเก็บ");
  if (!selectedSub) return alert("กรุณาเลือกช่องเก็บ");

  const btn = document.getElementById("save-btn");
  TissueApp.setLoading(btn, true);
  try {
    const result = await TissueApp.call("recordTransfer", {
      plant_id,
      lot_no,
      bottle_count: Number(bottleCount),
      plants_per_bottle: Number(plantsPerBottle),
      media_type: selectedMedia,
      bottle_no: selectedMedia === "TIB" ? bottle_no : "",
      shelf: selectedShelf,
      sub_shelf: selectedSub,
      recorded_by: (TissueApp.profile && TissueApp.profile.displayName) || "ไม่ระบุชื่อ",
    });

    // อัปเดตเลขล็อตล่าสุดที่จำไว้ในแคชทันที ไม่ต้องรอโหลดใหม่ทั้งหน้า — กันโชว์เลขล็อตเก่าค้างถ้าบันทึกล็อตใหม่ต่อกันหลายรายการ
    if (lotMode === "new") {
      const plant = plantsCache.find(p => p.plant_id === plant_id);
      const newLotNoNum = Number(lot_no);
      if (plant && !isNaN(newLotNoNum) && (plant.latest_lot_no === null || newLotNoNum > plant.latest_lot_no)) {
        plant.latest_lot_no = newLotNoNum;
      }
    }

    document.getElementById("form-wrap").classList.add("hidden");
    document.getElementById("after-actions").classList.remove("hidden");
    const banner = document.getElementById("result-banner");
    banner.classList.remove("hidden");

    let detail = `ล็อต ${result.lot_no} · ระยะ: ${result.stage} (รอบที่ ${result.round_in_stage}) · สูตร: ${result.recipe_used}`;
    detail += ` · ประเภท: ${result.media_type}`;
    if (result.bottle_no) detail += ` (ขวดเลขที่ ${result.bottle_no})`;
    detail += result.next_transfer_date
      ? ` · รอบถัดไป: ${result.next_transfer_date}`
      : ` · จบรอบติดตาม (พร้อมออกปลูกแล้ว)`;
    document.getElementById("result-detail").textContent = detail;
  } catch (err) {
    alert("บันทึกไม่สำเร็จ: " + err.message);
  } finally {
    TissueApp.setLoading(btn, false);
  }
});

document.getElementById("record-next-btn").addEventListener("click", () => {
  document.getElementById("form-wrap").classList.remove("hidden");
  document.getElementById("after-actions").classList.add("hidden");
  document.getElementById("result-banner").classList.add("hidden");
  document.getElementById("bottle-count").value = "20";
  document.getElementById("plants-per-bottle").value = "";
  document.getElementById("quantity-preview").textContent = "";
  document.getElementById("bottle-no").value = "";
  document.getElementById("bottle-no-field").classList.add("hidden");
  document.getElementById("lot-no-input").value = "";
  document.getElementById("lot-list").innerHTML = "";
  document.querySelectorAll("#media-type-grid .chip").forEach(c => c.classList.remove("active"));
  document.querySelectorAll("#lot-mode-grid .chip").forEach(c => c.classList.remove("active"));
  document.querySelector('#lot-mode-grid .chip[data-lot-mode="new"]').classList.add("active");
  document.getElementById("lot-new-field").classList.remove("hidden");
  document.getElementById("lot-existing-field").classList.add("hidden");
  lotMode = "new";
  selectedLotNo = null;
  selectedShelf = null;
  selectedSub = null;
  selectedMedia = null;
  loadStorage();
});

(async () => {
  await TissueApp.init();
  const badge = document.getElementById("lab-badge");
  badge.textContent = TissueApp.isAdmin() ? "ทุก Lab" : "Lab " + TissueApp.myLab;
  badge.classList.remove("hidden");
  await Promise.all([loadPlants(), loadStorage()]);
})();
</script>
</body>
</html>
