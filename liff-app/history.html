<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1" />
<title>ประวัติการถ่ายโอน</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Sarabun:wght@400;600;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="../shared/style.css" />
<script src="https://static.line-scdn.net/liff/edge/2/sdk.js"></script>
</head>
<body>
<div class="screen">

  <div class="topbar">
    <a href="#" id="back-btn" class="back-btn">‹</a>
    <h1 id="page-title">ประวัติการถ่ายโอน</h1>
    <span class="lab-badge hidden" id="lab-badge"></span>
  </div>

  <!-- ขั้นที่ 1: เลือกชนิดพืช -->
  <div id="view-plants">
    <p class="muted">เลือกชนิดพืชที่จะดูประวัติ</p>
    <div id="plant-list"></div>
  </div>

  <!-- ขั้นที่ 2: เลือกล็อต -->
  <div id="view-lots" class="hidden">
    <p class="muted">เลือกล็อตที่จะดูประวัติ (แสดงเฉพาะล็อตที่ยังติดตามอยู่)</p>
    <div id="lot-list"></div>
  </div>

  <!-- ขั้นที่ 3: ไทม์ไลน์ -->
  <div id="view-timeline" class="hidden">
    <div class="card" id="timeline-summary" style="margin-bottom:16px;"></div>
    <div class="card">
      <div id="timeline-list"></div>
    </div>
  </div>

</div>

<script src="js/api.js"></script>
<script>
let plantsCache = [];
let currentPlantId = null;

function show(view) {
  ["view-plants", "view-lots", "view-timeline"].forEach(id => {
    document.getElementById(id).classList.toggle("hidden", id !== view);
  });
}

function setBack(view, title) {
  document.getElementById("page-title").textContent = title;
  const backBtn = document.getElementById("back-btn");
  backBtn.onclick = (e) => {
    e.preventDefault();
    if (view === "plants") { window.location.href = "index.html"; return; }
    if (view === "lots") { loadPlantList(); return; }
  };
}

// ---------- ขั้นที่ 1 ----------
async function loadPlantList() {
  show("view-plants");
  setBack("plants", "ประวัติการถ่ายโอน");
  const list = document.getElementById("plant-list");
  list.innerHTML = '<p class="muted">กำลังโหลด...</p>';
  plantsCache = await TissueApp.call("listPlantsWithCount");
  list.innerHTML = "";
  if (plantsCache.length === 0) {
    list.innerHTML = '<p class="muted">ยังไม่มีชนิดพืชในระบบ</p>';
    return;
  }
  plantsCache.forEach(p => {
    const card = document.createElement("div");
    card.className = "card card-tap";
    card.innerHTML = `
      <div>
        <div class="plant-name">${p.plant_name}</div>
        <div class="plant-count">ล็อตที่ติดตามอยู่: ${p.active_count} ล็อต</div>
      </div>
      <div class="chevron">›</div>
    `;
    card.addEventListener("click", () => loadLotList(p.plant_id, p.plant_name));
    list.appendChild(card);
  });
}

// ---------- ขั้นที่ 2 ----------
async function loadLotList(plant_id, plant_name) {
  currentPlantId = plant_id;
  show("view-lots");
  setBack("lots", plant_name);
  const list = document.getElementById("lot-list");
  list.innerHTML = '<p class="muted">กำลังโหลด...</p>';
  const lots = await TissueApp.call("listActiveLots", { plant_id });
  list.innerHTML = "";
  if (lots.length === 0) {
    list.innerHTML = '<p class="muted">ชนิดนี้ยังไม่มีล็อตที่กำลังติดตามอยู่</p>';
    return;
  }
  lots.forEach(l => {
    const card = document.createElement("div");
    card.className = "card card-tap";
    card.innerHTML = `
      <div>
        <div class="plant-name">ล็อต ${l.lot_no}</div>
        <div class="plant-count">${l.stage} · รอบที่ ${l.round_no} · ชั้น ${l.shelf}/${l.sub_shelf} · ${l.media_type}${l.bottle_no ? " #" + l.bottle_no : ""}</div>
      </div>
      <div class="chevron">›</div>
    `;
    card.addEventListener("click", () => loadTimeline(plant_id, plant_name, l.lot_no));
    list.appendChild(card);
  });
}

// ---------- ขั้นที่ 3 ----------
async function loadTimeline(plant_id, plant_name, lot_no) {
  show("view-timeline");
  setBack("lots", `${plant_name} — ล็อต ${lot_no}`);
  document.getElementById("back-btn").onclick = (e) => { e.preventDefault(); loadLotList(plant_id, plant_name); };

  const summary = document.getElementById("timeline-summary");
  const list = document.getElementById("timeline-list");
  summary.innerHTML = '<p class="muted">กำลังโหลด...</p>';
  list.innerHTML = "";

  const history = await TissueApp.call("getLotHistory", { plant_id, lot_no });
  if (history.length === 0) {
    summary.innerHTML = '<p class="muted">ไม่พบประวัติของล็อตนี้</p>';
    return;
  }
  const latest = history[history.length - 1];
  summary.innerHTML = `
    <div class="plant-name">ทำ Subculture มาแล้วทั้งหมด ${history.length} รอบ</div>
    <div class="muted">ปัจจุบันอยู่ระยะ: ${latest.stage} · บันทึกล่าสุด ${latest.transfer_date}</div>
  `;

  list.innerHTML = history.map(h => `
    <div class="history-row">
      <div class="round-badge">${h.round_no}</div>
      <div class="content">
        <div class="top-line">
          <span>${h.stage}</span>
          <span class="media-tag">${h.media_type}${h.bottle_no ? " #" + h.bottle_no : ""}</span>
        </div>
        <div class="muted">${h.transfer_date} · ชั้น ${h.shelf}/${h.sub_shelf} · ${h.quantity} ต้น · สูตร: ${h.recipe_used || "-"}</div>
        <div class="muted">บันทึกโดย: ${h.recorded_by}</div>
      </div>
    </div>
  `).join("");
}

(async () => {
  await TissueApp.init();
  const badge = document.getElementById("lab-badge");
  badge.textContent = TissueApp.isAdmin() ? "ทุก Lab" : "Lab " + TissueApp.myLab;
  badge.classList.remove("hidden");
  const qPlant = TissueApp.getParam("plant_id");
  const qLotNo = TissueApp.getParam("lot_no");
  if (qPlant && qLotNo) {
    plantsCache = await TissueApp.call("listPlantsWithCount");
    const plant = plantsCache.find(p => p.plant_id === qPlant);
    await loadTimeline(qPlant, plant ? plant.plant_name : "", qLotNo);
    return;
  }
  await loadPlantList();
})();
</script>
</body>
</html>
